<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Avatar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    h1 { font-size: 1.2rem; font-weight: 500; color: #aaa; }
    #avatar-wrap {
      width: 360px; height: 360px;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      border: 3px solid #333;
    }
    #avatar-video { width: 100%; height: 100%; object-fit: cover; }
    #chat-box { display: flex; gap: 10px; width: 100%; max-width: 480px; }
    #user-input {
      flex: 1; padding: 13px 18px;
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 999px; color: #f0f0f0; font-size: 1rem; outline: none;
    }
    #user-input:disabled { opacity: .4; }
    #send-btn {
      padding: 13px 22px; background: #1e88e5; color: #fff;
      border: none; border-radius: 999px; font-size: 1rem; cursor: pointer;
    }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #status { font-size: .82rem; color: #888; text-align: center; }
  </style>
</head>
<body>

  <h1>AI Avatar</h1>
  <div id="avatar-wrap">
    <video id="avatar-video" autoplay playsinline muted></video>
  </div>
  <div id="chat-box">
    <input id="user-input" type="text" placeholder="Type a message…" disabled/>
    <button id="send-btn" disabled>Send</button>
  </div>
  <div id="status">Loading...</div>

  <script type="module">
    import { createAgentManager } from 'https://esm.sh/@d-id/client-sdk@1.1.53';

    const AGENT_ID    = 'v2_agt_LxzjMQLP';
    const CLIENT_KEY  = 'Z29vZ2xlLW9hdXRoMnwxMDg1MzgzODIxMDg4OTU5MjE2MzA6dUtILVVlUFhjeFNUZS1lNjV2VG5t';
    const N8N_WEBHOOK = 'https://rafa5555.app.n8n.cloud/webhook/22e378ba-aa29-44e6-bb40-7b434f726689/chat';

    const videoEl  = document.getElementById('avatar-video');
    const inputEl  = document.getElementById('user-input');
    const btnEl    = document.getElementById('send-btn');
    const statusEl = document.getElementById('status');

    let agentManager = null;
    let connected    = false;
    let stream       = null;

    function setStatus(s) { statusEl.textContent = s; }
    function setReady(yes) {
      inputEl.disabled = !yes;
      btnEl.disabled   = !yes;
      if (yes) inputEl.focus();
    }

    const callbacks = {
      onSrcObjectReady(value) {
        stream = value;
        videoEl.srcObject = value;
        videoEl.muted = true;
        videoEl.play().catch(() => {});
      },
      onConnectionStateChange(state) {
        setStatus(state);
        if (state === 'connected') {
          connected = true;
          setReady(true);
          setStatus('Connected ✓ — type a message');
        } else if (state === 'disconnected' || state === 'closed') {
          connected = false;
          setReady(false);
          setTimeout(() => agentManager?.reconnect(), 3000);
        }
      },
      onVideoStateChange(state) {
        if (state === 'STOP') {
          const idle = agentManager?.agent?.presenter?.idle_video;
          if (idle) { videoEl.srcObject = null; videoEl.src = idle; videoEl.loop = true; videoEl.play().catch(() => {}); }
          if (connected) setStatus('Connected ✓ — type a message');
        } else {
          videoEl.src = ''; videoEl.srcObject = stream;
          setStatus('Speaking...');
        }
      },
      onError(e) { console.error(e); setStatus('Error: ' + (e?.message ?? JSON.stringify(e))); }
    };

    setStatus('Connecting...');
    agentManager = await createAgentManager(AGENT_ID, {
      auth: { type: 'key', clientKey: CLIENT_KEY },
      callbacks,
      streamOptions: { compatibilityMode: 'auto', streamWarmup: true }
    });
    await agentManager.connect();

    async function send() {
      const text = inputEl.value.trim();
      if (!text || text.length < 3 || !connected) return;
      inputEl.value = '';
      setReady(false);
      setStatus('Thinking...');

      try {
        const res = await fetch(N8N_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        const reply = data.reply ?? data.output ?? data.text ?? data.message;
        if (!reply) throw new Error('No reply from n8n');

        await agentManager.speak({
          script: {
            type: 'text',
            provider: {
              type: 'microsoft',
              voice_id: 'en-IN-AartiNeural'
            },
            input: reply
          }
        });
      } catch(e) {
        setStatus('Error: ' + e.message);
        console.error(e);
      }
      setReady(true);
    }

    btnEl.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
