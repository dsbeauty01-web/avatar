<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>AI Avatar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    h1 { font-size: 1.2rem; font-weight: 500; color: #aaa; }
    #avatar-wrap {
      width: 360px; height: 360px;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      border: 3px solid #333;
    }
    #avatar-video { width: 100%; height: 100%; object-fit: cover; }
    #chat-box { display: flex; gap: 10px; width: 100%; max-width: 480px; }
    #user-input {
      flex: 1; padding: 13px 18px;
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 999px; color: #f0f0f0; font-size: 1rem; outline: none;
    }
    #user-input:disabled { opacity: .4; }
    #send-btn {
      padding: 13px 22px; background: #1e88e5; color: #fff;
      border: none; border-radius: 999px; font-size: 1rem; cursor: pointer;
    }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #status { font-size: .82rem; color: #888; text-align: center; }
  </style>
</head>
